services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sorier-backend
    ports:
      - "4000:4000"
    volumes:
      # mount only backend source so nodemon can watch for changes
      - ./backend:/app/backend
      # named volume preserves node_modules built during image build
      - backend_node_modules:/app/node_modules
    env_file: .env
    environment:
      # polling required for file-watch events through Docker on Windows/WSL
      - CHOKIDAR_USEPOLLING=true
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: sorier-frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    env_file: ./frontend/.env
    environment:
      - CHOKIDAR_USEPOLLING=true
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  backend_node_modules:
  frontend_node_modules:
